<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseDocs | Premium Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0A0A0B;
            --bg-surface: rgba(22, 22, 26, 0.6);
            --bg-card: rgba(30, 31, 38, 0.7);
            --primary: #6366F1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --secondary: #10B981;
            --secondary-glow: rgba(16, 185, 129, 0.3);
            --danger: #EF4444;
            --text-main: #FFFFFF;
            --text-muted: #9CA3AF;
            --border-light: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            /* Dynamic animated background */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.1), transparent 40%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dashboard {
            width: 100%;
            max-width: 1100px;
            display: grid;
            gap: 2rem;
            grid-template-columns: 1fr;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (min-width: 860px) {
            .dashboard {
                grid-template-columns: 380px 1fr;
                align-items: start;
            }
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s ease;
        }

        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            opacity: 0.5;
        }

        .glass-panel:hover {
            border-color: var(--border-highlight);
        }

        /* Branding */
        .brand {
            margin-bottom: 2.5rem;
        }

        .brand h1 {
            font-weight: 700;
            font-size: 2.8rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #FFFFFF 0%, #A5B4FC 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand h1 svg {
            color: var(--primary);
        }

        .brand p {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 1.1rem;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #E5E7EB;
        }

        h2 svg { color: var(--text-muted); }

        /* Advanced Upload Area */
        .upload-zone {
            border: 2px dashed rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            background: rgba(99, 102, 241, 0.03);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .upload-zone::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, var(--primary-glow) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        .upload-zone:hover {
            background: rgba(99, 102, 241, 0.08);
            border-color: rgba(99, 102, 241, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px var(--primary-glow);
        }

        .upload-zone:hover::after { opacity: 0.2; }

        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        .upload-content {
            position: relative;
            z-index: 2;
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            transition: transform 0.3s ease;
        }

        .upload-zone:hover .upload-icon {
            transform: scale(1.1);
            background: rgba(99, 102, 241, 0.2);
        }

        .upload-text {
            color: #E5E7EB;
            font-weight: 500;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 300;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px -3px var(--primary-glow);
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px -5px var(--primary-glow);
        }

        .btn-primary:hover::before { left: 100%; }

        .btn-primary:active { transform: translateY(0); }

        .btn-primary:disabled {
            background: rgba(255,255,255,0.1);
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-icon {
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid var(--border-light);
            padding: 0.5rem 1rem;
            width: auto;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-icon:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }

        .header-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
        }

        .header-action h2 { margin-bottom: 0; }

        /* File List - Premium Layout */
        .file-list {
            list-style: none;
            display: grid;
            gap: 1rem;
            grid-template-columns: 1fr;
        }

        .file-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-light);
            border-radius: 14px;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease forwards;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateX(4px);
            box-shadow: -5px 5px 20px -5px rgba(0,0,0,0.3);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            overflow: hidden;
            flex: 1;
        }

        .file-ext-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(16, 185, 129, 0.1));
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #A5B4FC;
            flex-shrink: 0;
        }

        .file-details {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .file-name {
            font-weight: 500;
            color: #F3F4F6;
            font-size: 1.05rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            gap: 0.5rem;
            align-items: center;
            font-weight: 300;
        }

        .file-meta span.dot {
            width: 4px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: inline-block;
        }

        .file-actions {
            display: flex;
            gap: 0.5rem;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .file-item:hover .file-actions { opacity: 1; }

        .action-link {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            border: 1px solid transparent;
        }

        .action-link:hover {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
            transform: scale(1.05);
        }

        .action-delete {
            color: var(--danger);
        }

        .action-delete:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #FCA5A5;
        }

        /* Status & Feedback */
        .status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            display: none;
            animation: slideUp 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .status.success { 
            background: rgba(16, 185, 129, 0.1); 
            color: #34D399; 
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 20px -5px var(--secondary-glow);
        }
        
        .status.error { 
            background: rgba(239, 68, 68, 0.1); 
            color: #FCA5A5; 
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            border: 1px dashed var(--border-light);
        }

        .empty-state svg {
            color: rgba(255,255,255,0.1);
            margin-bottom: 1rem;
            width: 64px;
            height: 64px;
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        
        <!-- Sidebar / Upload Area -->
        <div class="glass-panel" style="display: flex; flex-direction: column;">
            <div class="brand">
                <h1>
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    EaseDocs
                </h1>
                <p>Enterprise Grade Vault</p>
            </div>

            <form id="uploadForm" style="flex: 1; display: flex; flex-direction: column;">
                <div class="upload-zone" id="dropZone">
                    <input type="file" id="fileInput" name="file" required>
                    <div class="upload-content">
                        <div class="upload-icon">
                            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        </div>
                        <div class="upload-text" id="fileLabel">Drop file to encrypt</div>
                        <div class="upload-hint">Up to Vercel memory limits</div>
                    </div>
                </div>
                <button type="submit" id="uploadBtn" class="btn btn-primary" style="margin-top: auto;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    Secure Upload
                </button>
            </form>
            <div id="uploadStatus" class="status"></div>
        </div>

        <!-- Main Content Area / File List -->
        <div class="glass-panel">
            <div class="header-action">
                <h2>
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg>
                    Database Storage
                </h2>
                <button onclick="fetchFiles()" class="btn btn-icon">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right: 0.25rem; vertical-align: top;"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Sync
                </button>
            </div>
            
            <div id="fileListContainer">
                <ul id="fileList" class="file-list">
                    <!-- Files injected dynamically -->
                </ul>
                <div id="listStatus" class="empty-state">
                    <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 00.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 00-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0112 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 01-.673-.38m0 0A2.18 2.18 0 013 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 013.413-.387m7.5 0V5.25A2.25 2.25 0 0013.5 3h-3a2.25 2.25 0 00-2.25 2.25v.894m7.5 0a48.667 48.667 0 00-7.5 0M12 12.75h.008v.008H12v-.008z"></path></svg>
                    <p>Connecting to secure storage...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use relative path so it works everywhere (local Node and live on Vercel)
        const API_URL = '/api/files'; 

        // DOM Elements
        const uploadForm = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const uploadStatus = document.getElementById('uploadStatus');
        const fileList = document.getElementById('fileList');
        const listStatus = document.getElementById('listStatus');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileLabel = document.getElementById('fileLabel');
        const dropZone = document.getElementById('dropZone');

        // Update label when file selected
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileLabel.textContent = e.target.files[0].name;
                dropZone.style.borderColor = 'var(--secondary)';
                dropZone.style.background = '#F0FDF4';
            } else {
                fileLabel.textContent = 'Click to browse or drag file here';
                dropZone.style.borderColor = 'var(--primary)';
                dropZone.style.background = '#EEF2FF';
            }
        });

        // Handle File Upload
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const file = fileInput.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            uploadBtn.textContent = 'Uploading...';
            uploadBtn.disabled = true;
            showStatus(uploadStatus, '...', 'none');

            try {
                const response = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(uploadStatus, 'File uploaded successfully!', 'success');
                    uploadForm.reset();
                    fetchFiles(); // Refresh list automatically
                } else {
                    showStatus(uploadStatus, data.error || 'Upload failed', 'error');
                }
            } catch (error) {
                showStatus(uploadStatus, 'Network error during upload', 'error');
                console.error('Upload Error:', error);
            } finally {
                uploadBtn.textContent = 'Upload File';
                uploadBtn.disabled = false;
            }
        });

        // Fetch All Files
        async function fetchFiles() {
            showStatus(listStatus, 'Loading files...', 'none');
            fileList.innerHTML = '';

            try {
                const response = await fetch(API_URL);
                
                if (response.status === 404) {
                    showStatus(listStatus, 'No files found in database.', 'none');
                    return;
                }

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || 'Failed to fetch files');
                }

                const files = await response.json();
                
                if (files.length === 0) {
                    showStatus(listStatus, 'No files found.', 'none');
                    return;
                }

                listStatus.style.display = 'none';
                
                files.forEach(file => {
                    const sizeBytes = file.length || 0;
                    const sizeKB = (sizeBytes / 1024).toFixed(2);
                    const date = new Date(file.uploadDate).toLocaleDateString(undefined, {
                        year: 'numeric', month: 'short', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });

                    const li = document.createElement('li');
                    li.className = 'file-item';
                    li.innerHTML = `
                        <div class="file-info">
                            <div class="file-icon">
                                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            </div>
                            <div class="file-details">
                                <div class="file-name" title="${file.filename}">${file.filename}</div>
                                <div class="file-meta">
                                    <span>${sizeKB} KB</span>
                                    <span class="dot"></span>
                                    <span>${date}</span>
                                </div>
                            </div>
                        </div>
                        <div class="file-actions">
                            <a href="${API_URL}/${file._id}" target="_blank" class="action-link">Open</a>
                            <button class="action-link action-delete" onclick="deleteFile('${file._id}')" title="Delete File">
                                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    `;
                    fileList.appendChild(li);
                });
            } catch (error) {
                showStatus(listStatus, `Error loading files: ${error.message}`, 'error');
                console.error('Fetch Error:', error);
            }
        }

        // Delete File
        async function deleteFile(id) {
            if (!confirm('Are you sure you want to delete this file?')) return;

            try {
                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    fetchFiles(); // Refresh list
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to delete file');
                }
            } catch (error) {
                alert('Network error while deleting file');
                console.error('Delete Error:', error);
            }
        }

        // Helper to show status messages
        function showStatus(element, message, type) {
            element.textContent = message;
            element.className = 'status';
            if (type !== 'none') {
                element.classList.add(type);
                element.style.display = 'block';
            } else if (message) {
                 element.style.display = 'block';
                 element.style.color = '#6b7280';
                 element.style.background = 'transparent';
            } else {
                element.style.display = 'none';
            }
        }

        // Initial fetch
        fetchFiles();
    </script>
</body>
</html>
